greetings:
- 你好
- 您好
- hi
- hello
- hey
- 早上好
- 中午好
- 下午好
- 晚上好
- 晚安
- 谢谢
- 感谢
- 辛苦了
- 拜拜
- 再见
- 好的
- 收到
- 明白
- 了解
rules:
  GENERATE_REPORT:
    keywords:
    - 生成报告
    - 制作报表
    patterns:
    - 生成.*报
    - 制作.*报
    - 导出.*报
  QUERY_FRUITS:
    keywords:
    - 水果
    - 好卖
    patterns:
    - 水果
    - 哪种.*好卖
    - 水果.*销售
    - 什么.*好卖
    - 水果.*数据
  QUERY_STORES:
    keywords:
    - 店铺
    - 门店
    - 哪家店
    patterns:
    - 店铺
    - 门店
    - 哪家店
    - 店.*情况
    - 哪些.*店
    - 有哪些店
  VIEW_CROSS_WEEK:
    keywords:
    - 跨周
    - 对比
    - 趋势
    patterns:
    - 跨周
    - 对比
    - 趋势
    - 和.*比
  VIEW_MONTHLY_REPORT:
    keywords:
    - 那个月
    - 月报
    - 上个月
    - 本月
    - 这月
    - 上月
    patterns:
    - .*月份.*数据
    - 本月.*情况
    - 月报
    - 上个月.*数据
    - 月度.*汇总
    - 这个月.*
  VIEW_WEEKLY_REPORT:
    keywords:
    - 周报
    - 本周
    - 这周
    - 上周
    - 上一周
    - 下一周
    - 第一周
    - 第二周
    - 第三周
    - 第四周
    patterns:
    - 周报
    - 本周.*情况
    - 本周.*销售
    - 本周.*数据
    - 这周.*数据
    - 上周.*周报
    - 上一周.*
    - 第.*周
    - \d+月第.*周
    - 查看.*周.*数据
    - 看看.*周.*数据
    - 第\d+周.*数据
    - 本周.*情况
    - 本周.*销售
    - 这周.*数据
    - 上周.*周报
    - 上一周.*
    - 第.*周
    - \d+月第.*周
    priority: 10
thresholds:
  high: 0.8
  low: 0.5
