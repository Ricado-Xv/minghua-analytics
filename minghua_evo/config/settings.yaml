# 宿主系统配置（前端）
host_system:
  # 项目名称
  name: "茗花"
  # 宿主系统前端地址
  url: "http://localhost:3001"
  # 页面映射配置（意图 -> 页面路径）
  pages:
    VIEW_WEEKLY_REPORT: "/viewer.html?type=weekly"
    VIEW_MONTHLY_REPORT: "/viewer.html?type=monthly"
    VIEW_CROSS_WEEK: "/viewer.html?type=cross_week"
    QUERY_FRUITS: "/viewer.html?type=fruits"
    QUERY_STORES: "/viewer.html?type=stores"
  
  # 宿主项目 API 接口
  api:
    # 项目信息接口
    project_info: "/api/project-info"
    # README 文档接口
    readme: "/api/readme"
    # 设计文档接口
    design_doc: "/api/design-doc"

# 系统设置
openclaw:
  endpoint: "http://localhost:8080"
  model: "default"
  timeout: 60

# 数据源配置
data_provider:
  # 数据源类型: http (HTTP API) / mock (模拟数据)
  type: "http"
  # HTTP API 配置
  http:
    host: "localhost"
    port: 8081
    # 完整 API 地址（优先级高于 host:port）
    # base_url: "http://localhost:8081"
    # API 端点配置
    endpoints:
      health: "/api/health"
      months: "/api/months"
      weeks: "/api/weeks"
      weekly: "/api/weekly"
      monthly: "/api/monthly"
      cross_week: "/api/cross-week"
      stores: "/api/stores"
      fruits: "/api/fruits"
  # Mock 数据配置（当 type 为 mock 时使用）
  mock:
    enabled: false

# 意图识别配置
intent_classifier:
  # 是否启用 AI 识别
  use_ai: true
  # OpenClaw Gateway 地址
  host: "http://127.0.0.1:18789"
  # OpenClaw 认证 Token
  token: "4afbef8ff69f1f471d2300434940b753af7de83f23aad244"
  # 使用的 Agent 名称（推荐使用独立 Agent 避免阻塞主对话）
  agent: "test-agent"
  # AI 识别超时时间（秒）
  timeout: 60

evolution:
  default_trigger: "manual"
  schedule:
    enabled: false
    cron: "0 9 * * *"

conversation:
  storage: "json"
  retention_days: 30
  export_limit: 50

execution:
  timeout: 30
  allow_system_command: false

server:
  host: "0.0.0.0"
  port: 3001
  debug: false
