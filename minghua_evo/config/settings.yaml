# 系统设置
openclaw:
  endpoint: "http://localhost:8080"
  model: "default"
  timeout: 60

# 意图识别配置
intent_classifier:
  # 是否启用 AI 识别
  use_ai: true
  # OpenClaw Gateway 地址
  host: "http://127.0.0.1:18789"
  # OpenClaw 认证 Token
  token: "4afbef8ff69f1f471d2300434940b753af7de83f23aad244"
  # 使用的 Agent 名称（推荐使用独立 Agent 避免阻塞主对话）
  agent: "test-agent"
  # AI 识别超时时间（秒）
  timeout: 60

evolution:
  default_trigger: "manual"
  schedule:
    enabled: false
    cron: "0 9 * * *"

conversation:
  storage: "json"
  retention_days: 30
  export_limit: 50

execution:
  timeout: 30
  allow_system_command: false

server:
  host: "0.0.0.0"
  port: 3001
  debug: false
