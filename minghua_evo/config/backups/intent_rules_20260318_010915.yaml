# 意图识别规则配置
# 
# 这个文件解耦了正则匹配规则，便于独立进化
# 
# 结构：
#   rules:
#     意图类型:
#       keywords: 关键词列表（精确匹配，置信度0.95）
#       patterns: 正则表达式列表（置信度0.9）
#       priority: 优先级（数字越大越优先匹配）
#   
#   greetings:
#     闲聊/寒暄关键词列表
#
#   thresholds:
#     high: 高置信度阈值（直接返回）
#     low: 低置信度阈值（走AI识别）

rules:
  VIEW_WEEKLY_REPORT:
    priority: 10  # 优先级高于月报
    keywords:
      - 周报
      - 本周
      - 这周
      - 上周
      - 上一周
      - 下一周
      - 第一周
      - 第二周
      - 第三周
      - 第四周
    patterns:
      - "周报"
      - "本周.*情况"
      - "本周.*销售"
      - "本周.*数据"
      - "这周.*数据"
      - "上周.*周报"
      - "上一周.*"
      - "第.*周"
      - "\\d+月第.*周"
      - "查看.*周.*数据"
      - "看看.*周.*数据"
      - "第\\d+周.*数据"
      - "本周.*情况"
      - "本周.*销售"
      - "这周.*数据"
      - "上周.*周报"
      - "上一周.*"
      - "第.*周"           # 匹配"第1周"、"第2周"等
      - "\\d+月第.*周"     # 匹配"3月第一周"

  VIEW_MONTHLY_REPORT:
    keywords:
      - 月报
      - 本月
      - 这月
      - 上月
      - 上个月
    patterns:
      - "月报"
      - "本月.*情况"
      - "月度.*汇总"
      - "这个月.*"

  VIEW_CROSS_WEEK:
    keywords:
      - 跨周
      - 对比
      - 趋势
    patterns:
      - "跨周"
      - "对比"
      - "趋势"
      - "和.*比"

  QUERY_STORES:
    keywords:
      - 店铺
      - 门店
      - 哪家店
    patterns:
      - "店铺"
      - "门店"
      - "哪家店"
      - "店.*情况"
      - "哪些.*店"
      - "有哪些店"

  QUERY_FRUITS:
    keywords:
      - 水果
      - 好卖
    patterns:
      - "水果"
      - "哪种.*好卖"
      - "水果.*销售"
      - "什么.*好卖"
      - "水果.*数据"

  GENERATE_REPORT:
    keywords:
      - 生成报告
      - 制作报表
    patterns:
      - "生成.*报"
      - "制作.*报"
      - "导出.*报"

# 闲聊关键词（不纳入业务需求）
greetings:
  - 你好
  - 您好
  - hi
  - hello
  - hey
  - 早上好
  - 中午好
  - 下午好
  - 晚上好
  - 晚安
  - 谢谢
  - 感谢
  - 辛苦了
  - 拜拜
  - 再见
  - 好的
  - 收到
  - 明白
  - 了解

# 置信度阈值
thresholds:
  high: 0.8   # 高于此置信度，直接返回结果
  low: 0.5    # 低于此置信度，走AI识别
