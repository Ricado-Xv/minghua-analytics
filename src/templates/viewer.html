<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>茗花数据查看器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .app-container { display: flex; flex-direction: column; height: 100vh; }
    
    .app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .app-header h1 { font-size: 24px; }
    .header-actions { display: flex; gap: 8px; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn-secondary { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); }
    
    .app-main { display: flex; flex: 1; overflow: hidden; }
    .control-panel { width: 280px; border-right: 1px solid #e0e0e0; background: white; display: flex; flex-direction: column; overflow-y: auto; }
    .panel-section { padding: 16px; border-bottom: 1px solid #eee; }
    .section-title { font-size: 13px; color: #888; margin-bottom: 12px; font-weight: 600; }
    select { width: 100%; padding: 10px; font-size: 14px; border: 1px solid #e0e0e0; border-radius: 8px; }
    
    .content-section { flex: 1; background: #f9f9f9; overflow-y: auto; padding: 20px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #999; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    
    .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 20px; }
    .summary-card { background: linear-gradient(135deg, #f5f7fa, #e4e8ec); border-radius: 12px; padding: 20px; text-align: center; }
    .card-icon { font-size: 28px; margin-bottom: 8px; }
    .card-value { font-size: 24px; font-weight: 700; color: #333; }
    .card-label { font-size: 12px; color: #666; }
    
    .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .data-table th { background: #f8f9fa; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #667eea; }
    .data-table td { padding: 12px; border-bottom: 1px solid #e0e0e0; }
    .data-table tr:hover { background: #f8f9ff; }
    
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
    .compare-box { background: #f5f5f5; border-radius: 12px; padding: 16px; text-align: center; }
    .compare-box.week2 { background: #e8f4ff; }
    .compare-label { font-size: 14px; color: #666; margin-bottom: 8px; }
    .compare-value { font-size: 20px; font-weight: 700; }
    .compare-amount { color: #666; }
    
    .trend-box { margin: 16px 20px; padding: 16px; border-radius: 12px; text-align: center; }
    .trend-box.up { background: #d1fae5; }
    .trend-box.down { background: #fee2e2; }
    .trend-icon { font-size: 24px; margin-bottom: 8px; }
    .trend-value { font-size: 22px; font-weight: 700; }
    .trend-box.up .trend-value { color: #10b981; }
    .trend-box.down .trend-value { color: #ef4444; }
    .trend-label { font-size: 12px; color: #666; margin-top: 4px; }
    
    .loading { display: flex; align-items: center; justify-content: center; height: 100%; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 id="pageTitle">📊 数据查看器</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="location.reload()">🔄 刷新</button>
      </div>
    </header>
    
    <main class="app-main">
      <div class="control-panel">
        <div class="panel-section">
          <div class="section-title">报告类型</div>
          <select id="typeSelect" onchange="changeType()">
            <option value="weekly">周报</option>
            <option value="monthly">月报</option>
            <option value="cross_week">跨周对比</option>
            <option value="fruits">水果数据</option>
            <option value="stores">店铺数据</option>
          </select>
        </div>
        
        <div class="panel-section" id="monthSection">
          <div class="section-title">月份</div>
          <select id="monthSelect" onchange="changeMonth()">
          </select>
        </div>
        
        <div class="panel-section" id="weekSection" style="display:none;">
          <div class="section-title">周数</div>
          <select id="weekSelect" onchange="loadData()">
          </select>
        </div>
      </div>
      
      <div class="content-section" id="content">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <script>
    // API 基础地址 - 指向数据 API
    const API_BASE = 'http://localhost:8081';
    
    // 从 URL 读取参数
    function getParams() {
      const params = new URLSearchParams(location.search);
      return {
        type: params.get('type') || 'weekly',
        month: params.get('month') || '',
        week: params.get('week') || ''
      };
    }
    
    // 初始化
    async function init() {
      const params = getParams();
      document.getElementById('typeSelect').value = params.type;
      await loadMonths();
      if (params.month) document.getElementById('monthSelect').value = params.month;
      await loadData();
    }
    
    // 加载月份列表
    async function loadMonths() {
      const select = document.getElementById('monthSelect');
      try {
        const res = await fetch(API_BASE + '/api/months');
        const data = await res.json();
        select.innerHTML = data.months?.map(m => `<option value="${m}">${m}</option>`).join('') || '';
      } catch (e) {
        select.innerHTML = '<option value="">加载失败</option>';
      }
    }
    
    // 切换类型
    function changeType() {
      document.getElementById('weekSection').style.display = 
        (document.getElementById('typeSelect').value === 'weekly') ? 'block' : 'none';
      loadData();
    }
    
    // 切换月份
    function changeMonth() {
      loadData();
    }
    
    // 加载数据
    async function loadData() {
      const type = document.getElementById('typeSelect').value;
      const month = document.getElementById('monthSelect').value;
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      
      // 更新标题
      const titles = { 'weekly': '📊 周报', 'monthly': '📈 月报', 'cross_week': '📉 跨周对比', 'fruits': '🍎 水果数据', 'stores': '🏪 店铺数据' };
      document.getElementById('pageTitle').textContent = titles[type] || '数据查看器';
      
      try {
        let endpoint = '';
        let params = {};
        
        switch(type) {
          case 'weekly': endpoint = '/api/weekly'; if (month) params.month = month; break;
          case 'monthly': endpoint = '/api/monthly'; if (month) params.month = month; break;
          case 'cross_week': endpoint = '/api/cross-week'; if (month) params.month = month; break;
          case 'fruits': endpoint = '/api/fruits'; break;
          case 'stores': endpoint = '/api/stores'; break;
        }
        
        const url = API_BASE + endpoint + (Object.keys(params).length ? '?' + new URLSearchParams(params).toString() : '');
        const res = await fetch(url);
        const data = await res.json();
        
        render(data, type);
      } catch (e) {
        content.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>加载失败: ' + e.message + '</p></div>';
      }
    }
    
    // 渲染数据
    function render(data, type) {
      const content = document.getElementById('content');
      let html = '';
      
      // 统计卡片
      if (data.summary) {
        html += '<div class="summary-cards">';
        for (const [key, value] of Object.entries(data.summary)) {
          html += `<div class="summary-card"><div class="card-icon">${getIcon(key)}</div><div class="card-value">${formatNum(value)}</div><div class="card-label">${key}</div></div>`;
        }
        html += '</div>';
      }
      
      // 跨周对比
      if (type === 'cross_week' && data.summary) {
        const weeks = Object.keys(data.summary);
        if (weeks.length >= 2) {
          const w1 = data.summary[weeks[0]], w2 = data.summary[weeks[1]];
          const v1 = parseFloat(Object.values(w1)[0]) || 0, v2 = parseFloat(Object.values(w2)[0]) || 0;
          const diff = v2 - v1, pct = v1 ? (diff / v1 * 100).toFixed(1) : 0, isUp = diff >= 0;
          
          html += '<div class="compare-grid">';
          html += `<div class="compare-box"><div class="compare-label">${weeks[0]}</div><div class="compare-value">¥${formatNum(v1)}</div></div>`;
          html += `<div class="compare-box week2"><div class="compare-label">${weeks[1]}</div><div class="compare-value">¥${formatNum(v2)}</div></div>`;
          html += '</div>';
          html += `<div class="trend-box ${isUp?'up':'down'}"><div class="trend-icon">${isUp?'📈':'📉'}</div><div class="trend-value">${isUp?'+':''}${formatNum(diff)}元 (${isUp?'+':''}${pct}%)</div><div class="trend-label">环比变化</div></div>`;
        }
      }
      
      // 店铺表格
      const stores = data.stores || data.data?.stores;
      if (stores?.length) {
        const headers = Object.keys(stores[0]);
        html += '<div style="padding:20px;"><h3 style="margin-bottom:12px;">🏪 店铺数据</h3><table class="data-table"><thead><tr>';
        html += headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
        html += stores.slice(0, 20).map(row => '<tr>' + headers.map(h => `<td>${formatNum(row[h])}</td>`).join('') + '</tr>').join('');
        html += '</tbody></table></div>';
      }
      
      // 水果表格
      const fruits = data.fruits || data.data?.fruits || data.fruit_stats;
      if (fruits?.length) {
        const headers = Object.keys(fruits[0]);
        html += '<div style="padding:20px;"><h3 style="margin-bottom:12px;">🍎 水果数据</h3><table class="data-table"><thead><tr>';
        html += headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
        html += fruits.slice(0, 20).map(row => '<tr>' + headers.map(h => `<td>${formatNum(row[h])}</td>`).join('') + '</tr>').join('');
        html += '</tbody></table></div>';
      }
      
      content.innerHTML = html || '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无数据</p></div>';
    }
    
    function getIcon(key) {
      return {'店铺数':'🏪','水果种类':'🍎','总进货量':'📦','总进货额':'💰','销量':'📊'}[key] || '📈';
    }
    
    function formatNum(n) {
      if (n === undefined || n === null) return '-';
      return typeof n === 'number' ? n.toLocaleString('zh-CN', {maximumFractionDigits: 2}) : n;
    }
    
    init();
  </script>
</body>
</html>
