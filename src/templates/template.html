<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茗花汇报查看器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5; 
            min-height: 100vh; 
        }
        
        /* 主容器 - 双栏布局 */
        .app-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        
        /* 顶部header */
        .app-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px 24px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
        }
        .app-header h1 { font-size: 24px; }
        
        /* 主内容区 */
        .app-main { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
        }
        
        /* 左侧选择器区域 */
        .sidebar { 
            width: 380px; 
            border-right: 1px solid #e0e0e0; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .sidebar-header h2 { font-size: 18px; margin-bottom: 4px; }
        .sidebar-header p { font-size: 12px; opacity: 0.8; }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        /* 月份区块 */
        .month-block {
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
        }
        .month-block-header {
            padding: 12px 16px;
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .month-block-body {
            padding: 16px;
        }
        
        /* 选择器 */
        .selector-group {
            margin-bottom: 12px;
        }
        .selector-label {
            color: #666;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }
        select {
            width: 100%;
            padding: 10px 12px;
            font-size: 13px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }
        select:hover { border-color: #667eea; }
        select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.1); }
        
        /* 右侧内容区 */
        .content-area { 
            flex: 1; 
            background: #f9f9f9; 
            overflow: auto; 
            padding: 20px; 
        }
        
        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            max-width: 1400px;
        }
        
        /* 卡片样式 */
        .report-content {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: none;
            max-height: calc(100vh - 140px);
            overflow: hidden;
            flex-direction: column;
        }
        .report-content.active { display: flex; }
        
        .report-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px 20px; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white;
            flex-shrink: 0;
        }
        .report-title { font-size: 16px; font-weight: 600; }
        .report-file { font-size: 11px; opacity: 0.8; }
        
        .report-body {
            padding: 20px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.6;
            flex: 1;
        }
        
        /* 全局跨周对比 */
        .global-section {
            margin-top: 20px;
        }
        
        .empty { 
            text-align: center; 
            color: #888; 
            padding: 40px; 
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .content-wrapper { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 900px) {
            .sidebar { width: 300px; }
            .content-wrapper { grid-template-columns: 1fr; }
        }
        @media (max-width: 700px) {
            .app-main { flex-direction: column; }
            .sidebar { width: 100%; height: auto; max-height: 40vh; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🌸 茗花汇报查看器</h1>
        </header>
        <main class="app-main">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>📊 选择报告</h2>
                    <p>选择月份和报告类型查看详情</p>
                </div>
                <div class="sidebar-content" id="sidebarContent">
                    {{SIDEBAR}}
                </div>
            </aside>
            <div class="content-area" id="contentArea">
                {{CONTENT}}
            </div>
        </main>
    </div>
    <script src="viewer.js"></script>
</body>
</html>
