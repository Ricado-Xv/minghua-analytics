<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茗花汇报查看器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        h1 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 20px;
        }
        .header {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .selector {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .selector-label {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }
        select {
            padding: 10px 16px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            min-width: 150px;
        }
        select:hover { border-color: #4CAF50; }
        select:focus { outline: none; border-color: #4CAF50; }
        
        .month-section {
            margin-bottom: 30px;
        }
        .month-title {
            font-size: 18px;
            color: #666;
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 4px solid #4CAF50;
        }
        
        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .report-content {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            white-space: pre-wrap;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            display: none;
            max-height: 70vh;
            overflow-y: auto;
        }
        .report-content.active { display: block; }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
        }
        .report-title { font-size: 18px; font-weight: bold; color: #333; }
        .report-file { color: #888; font-size: 12px; }
        .empty { text-align: center; color: #888; padding: 40px; }
        
        @media (max-width: 1100px) {
            .content-wrapper { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 700px) {
            .content-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>🌸 茗花汇报查看器</h1>
{{CONTENT}}
    <script src="viewer.js"></script>
</body>
</html>
